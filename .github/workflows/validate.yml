name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate repository files
        shell: pwsh
        run: ./scripts/validate-repo.ps1

      - name: Validate RunPod template JSON
        run: python -m json.tool runpod/template.json >/dev/null

      - name: Check RunPod scripts
        run: |
          python -m py_compile scripts/download_hf_models.py scripts/install_custom_nodes.py
          bash -n runpod/start.sh
          test -f Dockerfile
          test -f .dockerignore

      - name: Dry-run model download manifest
        shell: pwsh
        run: ./scripts/download-hf-models.ps1 -ComfyUIPath . -Profile gguf -DryRun

      - name: Dry-run Python model download manifest
        run: python scripts/download_hf_models.py --comfyui-path . --profile gguf --dry-run
